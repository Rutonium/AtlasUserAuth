<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas Auth Login</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg" />
  <link rel="stylesheet" href="static/css/app.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-paper">
      <h1 class="login-title">Atlas User Auth</h1>
      <p class="muted">Shared authentication for Atlas applications</p>

      <form id="login-form" class="stack login-stack">
        <label class="field">
          Employee ID
          <input type="text" name="employee_id" id="employee-id-input" list="employee-suggestions" autocomplete="off" required />
          <datalist id="employee-suggestions"></datalist>
        </label>
        <label class="field">
          Password
          <input type="password" name="password" required />
        </label>
        <button class="login-btn" type="submit">Sign in</button>
      </form>

      <p id="login-message" class="message"></p>

      <div id="session-panel" class="login-session hidden">
        <div id="session-summary" class="session-summary"></div>
        <div class="login-actions">
          <a id="continue-link" class="login-btn login-link-btn hidden" href="#">Continue</a>
          <a id="admin-link" class="login-link-btn btn-secondary" href="admin">Open admin page</a>
          <button id="logout-existing-btn" class="btn-secondary hidden" type="button">Logout</button>
        </div>
      </div>

      {% if launcher_apps %}
      <section id="app-launcher-panel" class="login-launcher hidden" aria-labelledby="app-launcher-title">
        <div class="login-launcher-head">
          <div>
            <h2 id="app-launcher-title">Choose where to continue</h2>
            <p id="app-launcher-copy" class="muted">Pick an Atlas app to open after sign-in.</p>
          </div>
          <span id="app-launcher-badge" class="login-launcher-badge">No destination selected</span>
        </div>

        <div class="login-launcher-grid">
          {% for app in launcher_apps %}
          <button
            class="launcher-app-card"
            type="button"
            data-app-target="{{ app.path }}"
            data-app-key="{{ app.app_key }}"
            data-app-label="{{ app.label }}"
          >
            <span class="launcher-app-kicker">{{ app.app_key }}</span>
            <strong>{{ app.label }}</strong>
            <span>{{ app.description }}</span>
          </button>
          {% endfor %}
        </div>
      </section>
      {% endif %}

      <div class="links login-links">
        <a href="admin">Open admin page</a>
      </div>
    </section>
  </main>
  <script src="static/js/login.js"></script>
</body>
</html>
