# Include this snippet inside your shared server block.
# Friendly root aliases for login entrypoint on shared host.
location = /login {
    return 302 /atlas_user_auth/login;
}

location = /Login {
    return 302 /atlas_user_auth/login;
}

location = /atlas_user_auth {
    return 301 /atlas_user_auth/;
}

location /atlas_user_auth/ {
    client_max_body_size 10m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /atlas_user_auth;

    rewrite ^/atlas_user_auth/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:5020;
}
